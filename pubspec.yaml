name: tomenu_app
description: ToMenu — daily lunch menus from Slovak restaurants
publish_to: 'none'
version: 1.0.0+1
environment:
  sdk: '>=3.0.0 <4.0.0'
dependencies:
  flutter:
    sdk: flutter
  # networking
  http: ^1.6.0
  # local storage (settings, api key, nickname, etc.)
  shared_preferences: ^2.5.4
  # GPS location
  geolocator: ^14.0.2
  permission_handler: ^12.0.1
  # animations
  flutter_animate: ^4.5.2
  # fonts
  google_fonts: ^8.0.2
  # color picker for accent color setting
  flex_color_picker: ^3.6.0
  url_launcher: ^6.3.2
  image_picker: ^1.2.1
  intl: ^0.20.2
  # secure token storage for user auth
  flutter_secure_storage: ^9.0.0
dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0
  flutter_launcher_icons: ^0.14.4
flutter_launcher_icons:
  android: true
  ios: false
  image_path: "assets/icon.png"
flutter:
  uses-material-design: true
  assets:
    - assets/icon.png